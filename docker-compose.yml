version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: voicestress-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  ai-service:
    build:
      context: ./ai-service
    container_name: voicestress-ai
    restart: unless-stopped
    env_file:
      - ./ai-service/.env.example
    ports:
      - "8000:8000"

  backend:
    build:
      context: ./backend
    container_name: voicestress-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    environment:
      MONGO_URI: mongodb://mongodb:27017/voicestress
      AI_SERVICE_URL: http://ai-service:8000
      CLIENT_ORIGIN: http://localhost
      UPLOAD_DIR: /app/uploads
    depends_on:
      - mongodb
      - ai-service
    ports:
      - "5000:5000"
    volumes:
      - uploads-data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "/api"
    container_name: voicestress-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mongo-data:
  uploads-data:
